<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>重置密码</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d23 0%, #2d323c 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
        .btn-primary { background: #6C63FF; border: none; }
        .btn-primary:hover { background: #5a52d5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-4"><i class="bi bi-shield-lock"></i> 重置密码</h4>
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label small">新密码</label>
                                <input type="password" name="password" class="form-control" placeholder="输入新密码" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">确认密码</label>
                                <input type="password" name="confirm" class="form-control" placeholder="再次输入新密码" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">重置密码</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form></div></div></div></body>
</html>
