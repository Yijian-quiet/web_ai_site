<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>不颓废的小健</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f0eb; height: 100vh; overflow: hidden; }
#login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 24px; }
#login-page h1 { font-size: 1.5rem; color: #2d2a24; margin-bottom: 4px; }
#login-page p { color: #8a7a6a; font-size: 0.85rem; margin-bottom: 24px; }
#login-page input { width: 100%; max-width: 320px; padding: 14px 16px; border: 1px solid #e0d8d0; border-radius: 12px; font-size: 16px; background: white; margin-bottom: 12px; outline: none; }
#login-page input:focus { border-color: #b8624a; }
#login-page button { width: 100%; max-width: 320px; padding: 14px; border: none; border-radius: 12px; background: #b8624a; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
#login-page .error { color: #e74c3c; font-size: 0.85rem; margin-bottom: 12px; }
#chat-page { display: none; height: 100vh; flex-direction: column; }
#header { display: flex; align-items: center; padding: 12px 16px; background: white; border-bottom: 1px solid #ece6e0; }
#header .menu-btn { font-size: 1.3rem; background: none; border: none; cursor: pointer; padding: 4px 8px; }
#header h2 { flex: 1; text-align: center; font-size: 1rem; color: #2d2a24; }
#header .new-btn { font-size: 1.1rem; background: none; border: none; cursor: pointer; padding: 4px 8px; color: #b8624a; }
#messages { flex: 1; overflow-y: auto; padding: 12px 16px; }
.msg { max-width: 85%; margin-bottom: 12px; padding: 10px 14px; border-radius: 16px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
.msg.user { background: #b8624a; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
.msg.ai { background: white; color: #2d2a24; margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid #ece6e0; }
#input-area { display: flex; padding: 12px 16px; background: white; border-top: 1px solid #ece6e0; gap: 8px; }
#input-area input { flex: 1; padding: 12px 16px; border: 1px solid #e0d8d0; border-radius: 24px; font-size: 16px; outline: none; background: #f5f0eb; }
#input-area input:focus { border-color: #b8624a; }
#input-area button { padding: 12px 20px; border: none; border-radius: 24px; background: #b8624a; color: white; font-size: 16px; font-weight: 600; cursor: pointer; white-space: nowrap; }
#input-area button:disabled { opacity: 0.5; }
#sidebar { display: none; position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: white; z-index: 100; box-shadow: 2px 0 12px rgba(0,0,0,0.1); padding: 20px; overflow-y: auto; }
#sidebar.show { display: block; }
#sidebar .close-btn { float: right; font-size: 1.3rem; background: none; border: none; cursor: pointer; }
#sidebar h3 { font-size: 0.9rem; color: #8a7a6a; margin: 16px 0 8px; }
#sidebar .session-item { padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #2d2a24; margin-bottom: 4px; }
#sidebar .session-item:hover { background: #f5f0eb; }
#sidebar .logout-btn { width: 100%; padding: 12px; border: 1px solid #e0d8d0; border-radius: 8px; background: white; color: #e74c3c; margin-top: 16px; cursor: pointer; }
#overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 99; }
#overlay.show { display: block; }
.loading { text-align: center; color: #8a7a6a; padding: 20px; font-size: 0.85rem; }
</style>
</head>
<body>

<div id="login-page">
  <h1>不颓废的小健</h1>
  <p>自由基的AI分身</p>
  <div id="login-error" class="error"></div>
  <input type="text" id="login-user" placeholder="用户名" autocomplete="username">
  <input type="password" id="login-pass" placeholder="密码" autocomplete="current-password">
  <button id="login-btn" onclick="doLogin()">登 录</button>
</div>

<div id="chat-page">
  <div id="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h2 id="chat-title">不颓废的小健</h2>
    <button class="new-btn" onclick="newChat()">✏️</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input type="text" id="msg-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button id="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <button class="close-btn" onclick="toggleSidebar()">✕</button>
  <h3>对话历史</h3>
  <div id="session-list"></div>
  <button class="logout-btn" onclick="doLogout()">退出登录</button>
</div>

<script>
var state = { userId: null, sessionId: null, sessions: [] };

function toggleSidebar() {
  var s = document.getElementById("sidebar");
  var o = document.getElementById("overlay");
  s.classList.toggle("show");
  o.classList.toggle("show");
  if (state.userId) loadHistory();
}

function doLogin() {
  var btn = document.getElementById("login-btn");
  btn.disabled = true;
  btn.textContent = "登录中...";
  var user = document.getElementById("login-user").value;
  var pass = document.getElementById("login-pass").value;
  document.getElementById("login-error").textContent = "";
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/m/login", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      btn.disabled = false;
      btn.textContent = "登 录";
      if (xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          if (d.success) {
            state.userId = d.user_id;
            state.sessionId = "s" + Math.random().toString(36).substr(2);
            document.getElementById("login-page").style.display = "none";
            document.getElementById("chat-page").style.display = "flex";
            document.getElementById("chat-title").textContent = "新对话";
            loadHistory();
          } else {
            document.getElementById("login-error").textContent = d.error || "登录失败";
          }
        } catch(e) {
          document.getElementById("login-error").textContent = "数据异常";
        }
      } else {
        document.getElementById("login-error").textContent = "服务器错误(" + xhr.status + ")";
      }
    }
  };
  xhr.onerror = function() {
    btn.disabled = false;
    btn.textContent = "登 录";
    document.getElementById("login-error").textContent = "网络请求失败";
  };
  xhr.send(JSON.stringify({username: user, password: pass}));
}

function loadHistory() {
  if (!state.userId) return;
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/m/history", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        state.sessions = JSON.parse(xhr.responseText);
        var list = document.getElementById("session-list");
        list.innerHTML = "";
        for (var i = 0; i < state.sessions.length; i++) {
          var s = state.sessions[i];
          list.innerHTML += '<div class="session-item" onclick="loadSession(\'' + s.full_id + '\',\'' + s.title.replace(/\'/g,"\\\'") + '\')">' + s.title + '</div>';
        }
      } catch(e) {}
    }
  };
  xhr.send(JSON.stringify({user_id: state.userId}));
}

function loadSession(sid, title) {
  state.sessionId = sid;
  document.getElementById("chat-title").textContent = title;
  toggleSidebar();
  document.getElementById("messages").innerHTML = '<div class="loading">加载中...</div>';
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/m/messages", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4 && xhr.status === 200) {
      try {
        var msgs = JSON.parse(xhr.responseText);
        renderMessages(msgs);
      } catch(e) {}
    }
  };
  xhr.send(JSON.stringify({user_id: state.userId, session_id: sid}));
}

function renderMessages(msgs) {
  var el = document.getElementById("messages");
  var html = "";
  for (var i = 0; i < msgs.length; i++) {
    var cls = msgs[i].role === "user" ? "user" : "ai";
    html += '<div class="msg ' + cls + '">' + escapeHtml(msgs[i].content) + '</div>';
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

function newChat() {
  state.sessionId = "s" + Math.random().toString(36).substr(2);
  document.getElementById("chat-title").textContent = "新对话";
  document.getElementById("messages").innerHTML = "";
  toggleSidebar();
}

function sendMsg() {
  var input = document.getElementById("msg-input");
  var msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  document.getElementById("send-btn").disabled = true;
  renderMessages([{role:"user", content:msg}]);
  document.getElementById("messages").innerHTML += '<div class="loading" id="ai-loading">思考中...</div>';
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "/m/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      document.getElementById("send-btn").disabled = false;
      var loading = document.getElementById("ai-loading");
      if (loading) loading.remove();
      if (xhr.status === 200) {
        try {
          var d = JSON.parse(xhr.responseText);
          renderMessages([{role:"ai", content:d.reply}]);
          loadHistory();
        } catch(e) {}
      } else {
        document.getElementById("messages").innerHTML += '<div class="msg ai">请求失败，请重试</div>';
      }
    }
  };
  xhr.send(JSON.stringify({user_id: state.userId, session_id: state.sessionId, message: msg}));
}

function doLogout() {
  state = { userId: null, sessionId: null, sessions: [] };
  document.getElementById("chat-page").style.display = "none";
  document.getElementById("login-page").style.display = "flex";
  document.getElementById("messages").innerHTML = "";
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
  document.getElementById("sidebar").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}

function escapeHtml(t) {
  var d = document.createElement("div");
  d.textContent = t;
  return d.innerHTML;
}
</script>
</body>
</html>
