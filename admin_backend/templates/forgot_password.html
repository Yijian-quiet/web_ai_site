<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>忘记密码</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1d23 0%, #2d323c 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
        .btn-primary { background: #6C63FF; border: none; }
        .btn-primary:hover { background: #5a52d5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body p-4">
                        <h4 class="text-center mb-2"><i class="bi bi-key"></i> 忘记密码</h4>
                        <p class="text-center text-muted small mb-4">输入注册邮箱，我们将发送重置链接</p>
                        <form method="post">
                            <div class="mb-3">
                                <label class="form-label small">邮箱地址</label>
                                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">发送重置链接</button>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/admin/login" class="text-decoration-none small">返回登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
