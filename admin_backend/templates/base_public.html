<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mr.自由基 - AI4S{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #111122;
            --bg-card: rgba(17, 17, 34, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent: #00d4ff;
            --accent-dim: rgba(0, 212, 255, 0.15);
            --accent-glow: rgba(0, 212, 255, 0.25);
            --accent-secondary: #a855f7;
            --accent-secondary-dim: rgba(168, 85, 247, 0.15);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --gradient-1: linear-gradient(135deg, #0a0a12 0%, #111133 50%, #0a0a12 100%);
            --gradient-accent: linear-gradient(135deg, #00d4ff, #a855f7);
            --gradient-card: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(168,85,247,0.05));
            --radius: 12px;
            --radius-lg: 20px;
            --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 40px rgba(0,212,255,0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0,212,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grid overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Navigation ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(10,10,18,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .nav-brand {
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand i { -webkit-text-fill-color: initial; color: var(--accent); font-size: 1.3rem; }
        
        .nav-links { display: flex; gap: 2px; align-items: center; }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: var(--bg-glass);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 2px;
            background: var(--gradient-accent);
            border-radius: 1px;
        }
        .nav-links a i { margin-right: 6px; }

        /* Mobile menu toggle */
        .nav-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }

        /* ===== Main content ===== */
        main {
            position: relative;
            z-index: 1;
            padding-top: 64px;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        /* Page header */
        .page-header {
            padding: 80px 0 48px;
            text-align: center;
        }
        .page-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        .page-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }
        .page-header .accent-line {
            width: 60px;
            height: 3px;
            background: var(--gradient-accent);
            border-radius: 2px;
            margin: 16px auto;
        }

        /* Cards (glassmorphism) */
        .card-glass {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 28px;
            backdrop-filter: blur(12px);
            transition: var(--transition);
        }
        .card-glass:hover {
            border-color: var(--accent-dim);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }

        .card-glass .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .card-glass .card-subtitle {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .card-glass .card-text {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .card-glass .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .card-glass .card-tags .tag {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            background: var(--accent-dim);
            color: var(--accent);
        }
        .card-glass .card-tags .tag.tag-purple {
            background: var(--accent-secondary-dim);
            color: var(--accent-secondary);
        }

        /* Grid */
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        /* ===== Hero section (home) ===== */
        .hero {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }
        .hero-content { max-width: 700px; }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent-dim);
            margin-bottom: 24px;
        }
        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .hero h1 .gradient-text {
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero .subtitle {
            font-size: 1.3rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .hero .bio {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin: 0 auto 32px;
            line-height: 1.7;
        }
        .hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--gradient-accent);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 30px var(--accent-glow); }
        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-glass);
        }
        .btn-secondary:hover { background: var(--bg-card); border-color: var(--accent-dim); }

        /* ===== Highlights ===== */
        .highlights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 48px;
        }
        .highlight-item {
            padding: 20px;
            border-radius: var(--radius);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            transition: var(--transition);
        }
        .highlight-item:hover { border-color: var(--accent-dim); }
        .highlight-item i { font-size: 1.5rem; color: var(--accent); margin-bottom: 8px; }
        .highlight-item .value { font-size: 1.5rem; font-weight: 700; }
        .highlight-item .label { font-size: 0.8rem; color: var(--text-muted); }

        /* ===== Timeline ===== */
        .timeline { position: relative; padding: 20px 0; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-dim), var(--accent-secondary-dim), transparent);
        }
        .timeline-item {
            padding-left: 32px;
            padding-bottom: 32px;
            position: relative;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--gradient-accent);
            border: 2px solid var(--bg-primary);
        }
        .timeline-item .period {
            font-size: 0.8rem;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }
        .timeline-item .item-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .timeline-item .item-org { font-size: 0.85rem; color: var(--accent-secondary); margin-bottom: 8px; }
        .timeline-item .item-desc { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }

        /* ===== Tags ===== */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-badge.active { background: rgba(0,212,255,0.15); color: var(--accent); }
        .status-badge.completed { background: rgba(168,85,247,0.15); color: var(--accent-secondary); }
        .status-badge.draft { background: rgba(255,200,0,0.12); color: #ffc800; }

        /* ===== Section spacing ===== */
        .section { padding: 60px 0; }

        /* ===== Footer ===== */
        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border-subtle);
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        footer a { color: var(--accent); text-decoration: none; }

        /* ===== Animations ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-fade { animation: fadeInUp 0.6s ease forwards; }
        .anim-fade-d1 { animation: fadeInUp 0.6s ease 0.1s forwards; opacity: 0; }
        .anim-fade-d2 { animation: fadeInUp 0.6s ease 0.2s forwards; opacity: 0; }
        .anim-fade-d3 { animation: fadeInUp 0.6s ease 0.3s forwards; opacity: 0; }

        @media (max-width: 768px) {
            nav { padding: 0 16px; }
            .nav-links { display: none; position: absolute; top: 64px; left: 0; right: 0; background: rgba(10,10,18,0.95); flex-direction: column; padding: 16px; border-bottom: 1px solid var(--border-subtle); }
            .nav-links.open { display: flex; }
            .nav-toggle { display: block; }
            .hero h1 { font-size: 2.5rem; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .highlights { grid-template-columns: repeat(2, 1fr); }
        .highlights { justify-content: center; }
            .page-header h1 { font-size: 2rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="nav-brand"><i class="bi bi-dot"></i> Mr.自由基</a>
        <div class="nav-links" id="navLinks">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}"><i class="bi bi-house"></i> 首页</a>
            <a href="/about" class="{% if request.path == '/about' %}active{% endif %}"><i class="bi bi-person"></i> 关于</a>
            <a href="/projects" class="{% if request.path == '/projects' %}active{% endif %}"><i class="bi bi-journal-code"></i> 项目</a>
            <a href="/publications" class="{% if request.path == '/publications' %}active{% endif %}"><i class="bi bi-file-earmark-text"></i> 发表</a>
            <a href="/tools" class="{% if request.path == '/tools' %}active{% endif %}"><i class="bi bi-tools"></i> 工具</a>
            <a href="/blog" class="{% if request.path == '/blog' %}active{% endif %}"><i class="bi bi-pencil"></i> 博客</a>
            <a href="/chat"><i class="bi bi-chat-dots"></i> AI</a>
        </div>
        <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 <a href="/">Mr.自由基</a> · 用 AI 探索化学 · <a href="https://github.com/Yijian-quiet" target="_blank"><i class="bi bi-github"></i></a> · <a href="https://beian.miit.gov.cn/" target="_blank" style="font-size:0.75rem;">苏ICP备2026040859号-1</a></p>
    </footer>

    <script>
        // Highlight current nav
        document.querySelectorAll('.nav-links a').forEach(a => {
            if (a.getAttribute('href') === window.location.pathname) a.classList.add('active');
        });
        // Close mobile menu on click
        document.querySelectorAll('.nav-links a').forEach(a => {
            a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'));
        });
    </script>
</body>
</html>
